<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Page</title>
    <link rel="stylesheet" href="auto-suggest.css">
</head>
<body>
<div class="container">
    <div class="top-bar">
        <div class="gear">
            &#9881;
        </div>
        <div class="right">
            &#9200; Online &nbsp; | &nbsp; &#128339; -ms
        </div>
    </div>
    <h1>
          <span class="first">Hansika</span><span class="second">Rathod</span>
    </h1>
    <p>
        One million phrases. Four algorithms. Prefix Based Auto Suggest.
    </p>
    <div class="search-box">
    <span class="lens">&#128269;</span>
    <input type="search" placeholder="Start typing to search">
    </div>
    <div class="suggestion-box">
        <input type="suggestion" placeholder="Suggestion Box">
    </div>
</div>
<script>
    var searchBox = document.getElementById("search-box");
searchBox.addEventListener("input", function () {
    var userInput = searchBox.value;
    if (userInput.trim() === "") {
    
    } else {
        var url1 = "https://autosuggest-backend.onrender.com/api/autosuggest?q=";
        var url3 = "&algorithm=brute&limit=10&weighted=false";
        var url = url1 + userInput + url3;
        fetch(url)
            .then(function (response) {
                return response.json();
            })
            .then(function (data) {
                console.log(data); 
            })
            .catch(function (error) {
                console.log("Error:", error);
            });
    }
});
</script>
</body>
</html>
