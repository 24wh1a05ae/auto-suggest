<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random User Card</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <!-- Navigation -->
    <div id="nav">
        <a href="/">Home</a>
        <a href="https://leetcode.com/problemset/" target="_blank">LeetCode</a>
        <a href="./pages/auto-suggest.html" target="_blank">Pages</a>
        <a href="/">CodeForces</a>
    </div>

    <!-- Home Section -->
    <div id="home-card">
        <h1>Home Page</h1>
        <p id="p1">Operations on User Card</p>
        <p id="p2">Toggle, Get Random User, Users Present</p>
    </div>

    <!-- User Card -->
    <div id="card">

        <div id="card-img">
            <img id="img" src="./images/jane.png" alt="User Image">
        </div>

        <h2 id="card-name">John Doe</h2>

        <p id="card-gender">Female</p>

        <button id="card-btn" onclick="toggle()">
            Toggle
        </button>

        <button onclick="getRandomUser()">
            Random User
        </button>

    </div>

    <script src="index.js"></script>

</body>
</html>
